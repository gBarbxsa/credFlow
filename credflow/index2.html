</head>
<body>
    <div class="container">
            <nav class="navbar">
            <div class="logo">
                <img src="assets/logov2.png" class="image" alt="">
                <h1 href="" class="credflow">CredFlow</h1>
            </div>
            <div class="links">
                 <a href="" class="link">Fale conosco</a>

                 <a href="" class="link">Recursos</a>
                 <a href="" class="link">Blog</a>
            </div>
        </nav>
    </div>
    <div class="container2">
       <a href="saldo.html" class="add"><button class="add">Adicionar Saldo</button></a> 
     <div class="cards">
            <div class="card">
                <h3>Entradas</h3>
                <div class="value green">R$ 50.000,00</div>
            </div>
            <div class="card">
                <h3>Saídas</h3>
                <div class="value red">R$ 5.500,00</div>
            </div>
            <div class="card">
                <h3>Saldo Atual</h3>
                <div class="value green">R$ 44.500,00</div>
            </div>
        </div>
        <div class="transactions">
            <a href="#" class="btn">+ Nova Transação</a>
            <a href="#" class="btn">+ Editar</a>
            <h3>Últimas Transações</h3>

            <div class="transaction">
                <div class="t-left">
                    <div class="circle red"></div>
                    <div>
                        <strong>Aluguel</strong><br>
                        <span class="tag">Moradia / Aluguel • 20/11/2025</span>
                    </div>
                </div>
                <div class="amount red">- R$ 5.500,00</div>
            </div>

            <div class="transaction">
                <div class="t-left">
                    <div class="circle green"></div>
                    <div>
                        <strong>Salário</strong><br>
                        <span class="tag">Salário / Renda • 20/11/2025</span>
                    </div>
                </div>
                <div class="amount green">+ R$ 50.000,00</div>
            </div>
        </div>
    </div>
